<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variable Font Pattern</title>
    <!-- If your license requires a tracking script (pc-012 in reference-fonts-implementation), add it in this head or before </body>—this demo does not. -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1 id="demo">Variable font demo</h1>
    <label for="slider">Weight axis (wght): <span id="weight-value">400</span></label>
    <input
      type="range"
      id="slider"
      min="100"
      max="900"
      value="400"
      aria-valuemin="100"
      aria-valuemax="900"
      aria-valuenow="400"
      aria-label="Variable font weight axis"
    />
    <script src="script.js"></script>
  </body>
</html>
